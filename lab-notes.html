  <script>
  const aboutSections = document.querySelectorAll(".about-section");

  if ("IntersectionObserver" in window) {
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        const section = entry.target;
        const sectionIndex = Number(section.dataset.revealIndex);

        if (entry.isIntersecting) {
          section.style.transitionDelay = `${Math.min(sectionIndex * 80, 240)}ms`;
          section.classList.add("is-visible");

          setTimeout(() => {
            section.style.transitionDelay = "";
          }, 700);
        } else {
          section.style.transitionDelay = "0ms";
          section.classList.remove("is-visible");
        }
      });
    }, {
      threshold: 0.22
    });

    aboutSections.forEach((section, index) => {
      section.dataset.revealIndex = index;
      section.classList.add("reveal-ready");
      observer.observe(section);
    });
  } else {
    aboutSections.forEach((section) => {
      section.classList.add("is-visible");
    });
  }
</script>
